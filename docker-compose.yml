services:
  mariadb:
    image: mariadb:11.4
    container_name: helpdesk-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DATABASE_PASSWORD:-rootpassword}
      MARIADB_DATABASE: ${DATABASE_NAME:-helpdesk}
      MARIADB_USER: ${DATABASE_USER:-helpdesk}
      MARIADB_PASSWORD: ${DATABASE_PASSWORD:-helpdeskpass}
      TZ: ${TZ:-UTC}
    ports:
      - "${DATABASE_PORT:-3306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: helpdesk-phpmyadmin
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"

  mongodb:
    image: mongo:7
    container_name: helpdesk-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-adminpassword}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-helpdesk}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mariadb_data:
  mongodb_data:
