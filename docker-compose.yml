services:
  mariadb:
    image: mariadb:11.4
    container_name: helpdesk-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DATABASE_PASSWORD:-rootpassword}
      MARIADB_DATABASE: ${DATABASE_NAME:-helpdesk}
      MARIADB_USER: ${DATABASE_USER:-helpdesk}
      MARIADB_PASSWORD: ${DATABASE_PASSWORD:-helpdeskpass}
      TZ: ${TZ:-UTC}
    ports:
      - "${DATABASE_PORT:-3306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: helpdesk-phpmyadmin
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"

volumes:
  mariadb_data:
